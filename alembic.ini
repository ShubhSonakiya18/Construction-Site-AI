# alembic.ini — Alembic configuration for Construction Site AI

[alembic]
# Path to the migration scripts directory
script_location = database/migrations

# Template for new migration filenames
# %(rev)s      = short revision hash
# %(slug)s     = description slug from revision message
# %(epoch)s    = unix timestamp
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps in generated files
timezone = UTC

# Truncate long migration slugs to keep filenames readable
truncate_slug_length = 40

# Set to true to run migrations in a transaction that is rolled back
# on failure (the default). Do NOT disable this.
transaction_per_migration = true

# SQLAlchemy connection string.
# This is overridden by env.py reading DATABASE_URL from the environment,
# so this value is a fallback for direct alembic CLI usage.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/construction_site_ai

# Connection pool settings for the Alembic env (not the app pool)
sqlalchemy.pool_pre_ping = true

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine
propagate = 0

[logger_alembic]
level = INFO
handlers =
qualname = alembic
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
